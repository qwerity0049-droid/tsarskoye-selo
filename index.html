const { useState, useEffect, useRef } = React;

function useReveal(threshold = 0.1) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) el.classList.add('visible');
    }, { threshold });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return ref;
}

function useCounter(target, active, duration = 1800) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    if (!active) return;
    let v = 0;
    const step = target / (duration / 16);
    const t = setInterval(() => {
      v += step;
      if (v >= target) { setVal(target); clearInterval(t); }
      else setVal(Math.floor(v));
    }, 16);
    return () => clearInterval(t);
  }, [active, target]);
  return val;
}

/* ── STATS ── */
function Stats() {
  const ref = useRef(null);
  const [active,setActive]=useState(false);
  useEffect(()=>{
    const el=ref.current; if(!el) return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setActive(true)},{threshold:.3});
    obs.observe(el); return ()=>obs.disconnect();
  },[]);
  const items=[
    {val:500,suf:'+',label:'Довольных клиентов',sub:'с 2018 года'},
    {val:null,raw:'4.9★',label:'Рейтинг',sub:'на Яндекс.Картах'},
    {val:7,suf:'',label:'Лет опыта',sub:'на рынке Тольятти'},
    {val:98,suf:'%',label:'Рекомендуют',sub:'своим друзьям'},
  ];
  return (
    <section style={{padding:'76px 24px',background:'linear-gradient(135deg,rgba(201,168,76,.07) 0%,rgba(10,10,10,0) 50%,rgba(201,168,76,.07) 100%)',borderTop:'1px solid rgba(201,168,76,.1)',borderBottom:'1px solid rgba(201,168,76,.1)'}}>
      <div ref={ref} style={{maxWidth:1200,margin:'0 auto',display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:36,textAlign:'center'}}>
        {items.map(it=><StatItem key={it.label} {...it} active={active}/>)}
      </div>
    </section>
  );
}
function StatItem({val,suf,raw,label,sub,active}) {
  const count=useCounter(val||0,active&&!raw);
  const display=raw?(active?raw:'0★'):(count+(suf||''));
  return (
    <div>
      <div style={{fontSize:'clamp(40px,5.5vw,60px)',fontWeight:900,lineHeight:1}} className="gradient-text">{display}</div>
      <div style={{fontSize:15,fontWeight:600,marginTop:8,marginBottom:4}}>{label}</div>
      <div style={{fontSize:12,color:'#555'}}>{sub}</div>
    </div>
  );
}
